spring.application.name=toy

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/toy?serverTimezone=Asia/Seoul
spring.datasource.username=your_db_username
spring.datasource.password=your_db_password

mybatis.mapper-locations=classpath:/mappers/**/*.xml
mybatis.type-aliases-package=com.toy.auth.user.domain

logging.level.com.toy.auth.user.mapper=DEBUG
